http:
  routers:
    firewall:
      entryPoints:
        - "https"
      rule: "Host(`fw.local.zech.co`)"
      middlewares:
        - default-headers
        - https-redirectscheme
      tls: {}
      service: firewall
    proxmox:
      entryPoints:
        - "https"
      rule: "Host(`pve.local.zech.co`)"
      middlewares:
        - default-headers
        - https-redirectscheme
      tls: {}
      service: proxmox
    ilo:
      entryPoints:
        - "https"
      rule: "Host(`ilo.local.zech.co`)"
      middlewares:
        - default-headers
        - https-redirectscheme
      tls: {}
      service: ilo
    nas:
      entryPoints:
        - "https"
      rule: "Host(`nas.local.zech.co`)"
      middlewares:
        - default-headers
        - https-redirectscheme
      tls: {}
      service: nas
    jellyfin:
      entryPoints:
        - "https"
      rule: "Host(`jellyfin.local.zech.co`)"
      middlewares:
        - default-headers
        - https-redirectscheme
      tls: {}
      service: jellyfin

  services:
    firewall:
      loadBalancer:
        servers:
          - url: "https://10.0.1.1:4444"
        passHostHeader: true
    proxmox:
      loadBalancer:
        servers:
          - url: "https://10.0.1.10:8006"
        passHostHeader: true
    ilo:
      loadBalancer:
        servers:
          - url: "https://10.0.1.20"
        passHostHeader: true
    nas:
      loadBalancer:
        servers:
          - url: "https://10.0.1.30"
        passHostHeader: true
    jellyfin:
      loadBalancer:
        servers:
          - url: "http://10.0.1.30:8096"
        passHostHeader: true

  middlewares:
    https-redirectscheme:
      redirectScheme:
        scheme: https
        permanent: true

    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https

    default-whitelist:
      ipWhiteList:
        sourceRange:
        - "10.0.0.0/8"
        - "192.168.0.0/16"
        - "172.16.0.0/12"

    secured:
      chain:
        middlewares:
        - default-whitelist
        - default-headers
