version: "3"

services:
  sonarr:
    container_name: sonarr
    image: linuxserver/sonarr
    restart: unless-stopped
    environment:
      PGID: 1000
      PUID: 1000
      TZ: Europe/Vienna
    volumes:
      - ./sonarr/config:/config
      - /mnt/tv:/tv
      - /mnt/downloads:/downloads
    networks:
      - proxy
      - media
    
  radarr:
    container_name: radarr
    image: linuxserver/radarr
    restart: unless-stopped
    environment:
      PGID: 1000
      PUID: 1000
      TZ: Europe/Vienna
    volumes:
      - ./radarr/config:/config
      - /mnt/movies:/movies
      - /mnt/downloads:/downloads
    networks:
      - proxy
      - media

  prowlarr:
    container_name: prowlarr
    image: linuxserver/prowlarr
    restart: unless-stopped
    environment:
      PGID: 1000
      PUID: 1000
      TZ: Europe/Vienna
    volumes:
      - ./prowlarr/config:/config
    networks:
      - proxy
      - media

  bazarr:
    container_name: bazarr
    image: linuxserver/bazarr
    restart: unless-stopped
    environment:
      PGID: 1000
      PUID: 1000
      TZ: Europe/Vienna
    volumes:
      - ./bazarr/config:/config
      - /mnt/tv:/tv
      - /mnt/movies:/movies
    networks:
      - proxy
      - media

  jellyseerr:
    container_name: jellyseerr
    image: fallenbagel/jellyseerr
    restart: unless-stopped
    environment:
      TZ: Europe/Vienna
    volumes:
      - ./jellyseerr/config:/config
    networks:
      - proxy

  tdarr:
    container_name: tdarr
    image: haveagitgat/tdarr
    restart: unless-stopped
    ports:
      - 8265:8265
      - 8266:8266
    environment:
      PGID: 1000
      PUID: 1000
      TZ: Europe/Vienna
      serverPort: 8266
      webUIPort: 8265
      internalNode: false
    volumes:
      - ./tdarr/logs:/app/logs
      - ./tdarr/server:/app/server
      - ./tdarr/configs:/app/configs
      - /mnt/temp:/temp
      - /mnt/movies:/mnt/media/Movies
      - /mnt/tv:/mnt/media/TV
    networks:
      - proxy

networks:
  proxy: 
    external: true
