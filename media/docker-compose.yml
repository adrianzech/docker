version: "3"

services:
  tdarr:
    container_name: tdarr
    image: haveagitgat/tdarr
    restart: unless-stopped
    ports:
      - 8265:8265
      - 8266:8266
    environment:
      PGID: 1000
      PUID: 1000
      TZ: Europe/Vienna
      serverPort: 8266
      webUIPort: 8265
      internalNode: false
    volumes:
      - ./tdarr/logs:/app/logs
      - ./tdarr/server:/app/server
      - ./tdarr/configs:/app/configs
      - /mnt/temp:/temp
      - /mnt/movies:/mnt/media/Movies
      - /mnt/tv:/mnt/media/TV
    networks:
      - proxy

networks:
  proxy: 
    external: true
